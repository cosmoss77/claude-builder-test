<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>로또 번호 생성기</title>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5837854875453456"
     crossorigin="anonymous"></script>
<style>
  :root {
    --bg: #f4f6fa;
    --text: #333;
    --card-bg: #ffffff;
    --label: #666;
    --input-border: #ccc;
    --input-bg: #ffffff;
    --shadow: rgba(0, 0, 0, 0.05);
    --primary: #4a7dff;
    --primary-hover: #3a66d6;
  }
  [data-theme="dark"] {
    --bg: #1a1d24;
    --text: #e8eaed;
    --card-bg: #2a2e38;
    --label: #aab0bc;
    --input-border: #444a55;
    --input-bg: #2a2e38;
    --shadow: rgba(0, 0, 0, 0.4);
    --primary: #5a8dff;
    --primary-hover: #4a7dff;
  }
  body {
    font-family: 'Apple SD Gothic Neo', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    min-height: 100vh;
    margin: 0;
    transition: background 0.2s, color 0.2s;
  }
  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
  }
  h1 { color: var(--text); margin: 0; }
  .theme-toggle {
    background: none;
    border: 1px solid var(--input-border);
    border-radius: 50%;
    width: 40px;
    height: 40px;
    font-size: 18px;
    cursor: pointer;
    padding: 0;
    color: var(--text);
  }
  .theme-toggle:hover { background: var(--card-bg); }
  .contact-link {
    color: var(--primary);
    text-decoration: none;
    font-size: 14px;
    margin-bottom: 24px;
  }
  .contact-link:hover { text-decoration: underline; }
  .controls {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }
  input[type="number"] {
    width: 80px;
    padding: 10px;
    font-size: 16px;
    border: 1px solid var(--input-border);
    background: var(--input-bg);
    color: var(--text);
    border-radius: 8px;
    text-align: center;
  }
  button.primary {
    padding: 10px 20px;
    font-size: 16px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }
  button.primary:hover { background: var(--primary-hover); }
  .games { width: 100%; max-width: 480px; }
  .game {
    background: var(--card-bg);
    padding: 16px;
    margin-bottom: 12px;
    border-radius: 12px;
    box-shadow: 0 2px 6px var(--shadow);
    display: flex;
    align-items: center;
    gap: 12px;
    transition: background 0.2s;
  }
  .label {
    font-weight: bold;
    color: var(--label);
    min-width: 50px;
  }
  .ball {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    color: white;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
  }
  .b1 { background: #fbc400; }
  .b2 { background: #69c8f2; }
  .b3 { background: #ff7272; }
  .b4 { background: #aaa; }
  .b5 { background: #b0d840; }
  .comments {
    width: 100%;
    max-width: 480px;
    margin-top: 32px;
    padding: 20px;
    background: var(--card-bg);
    border-radius: 12px;
    box-shadow: 0 2px 6px var(--shadow);
    transition: background 0.2s;
  }
  .comments h2 {
    margin: 0 0 16px;
    font-size: 18px;
    color: var(--text);
  }
</style>
</head>
<body>
  <div class="header">
    <h1>🎱 로또 번호 생성기</h1>
    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn" aria-label="테마 전환">🌙</button>
  </div>
  <a href="contact.html" class="contact-link">📬 제휴 문의하기 →</a>
  <div class="controls">
    <input id="count" type="number" value="5" min="1" max="20">
    <button class="primary" onclick="generate()">생성</button>
  </div>
  <div class="games" id="games"></div>

  <section class="comments">
    <h2>💬 댓글</h2>
    <div id="disqus_thread"></div>
  </section>

  <script>
    var disqus_config = function () {
      this.page.url = 'https://cosmoss77.github.io/claude-builder-test/';
      this.page.identifier = 'lotto-main';
    };
    (function() {
      var d = document, s = d.createElement('script');
      s.src = 'https://productbuilder-b1lph4msxo.disqus.com/embed.js';
      s.setAttribute('data-timestamp', +new Date());
      (d.head || d.body).appendChild(s);
    })();
  </script>
  <noscript>댓글을 보려면 JavaScript를 활성화해 주세요. <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>

<script>
  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    document.getElementById('themeBtn').textContent = theme === 'dark' ? '☀️' : '🌙';
    localStorage.setItem('theme', theme);
  }

  function toggleTheme() {
    const current = document.documentElement.getAttribute('data-theme') || 'light';
    applyTheme(current === 'dark' ? 'light' : 'dark');
  }

  (function initTheme() {
    const saved = localStorage.getItem('theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    applyTheme(saved || (prefersDark ? 'dark' : 'light'));
  })();

  function generateLotto() {
    const numbers = new Set();
    while (numbers.size < 6) {
      numbers.add(Math.floor(Math.random() * 45) + 1);
    }
    return [...numbers].sort((a, b) => a - b);
  }

  function ballClass(n) {
    if (n <= 9) return 'b1';
    if (n <= 19) return 'b2';
    if (n <= 29) return 'b3';
    if (n <= 39) return 'b4';
    return 'b5';
  }

  function generate() {
    const count = parseInt(document.getElementById('count').value) || 1;
    const container = document.getElementById('games');
    container.innerHTML = '';
    for (let i = 1; i <= count; i++) {
      const game = document.createElement('div');
      game.className = 'game';
      game.innerHTML = `<span class="label">${i}게임</span>` +
        generateLotto().map(n =>
          `<div class="ball ${ballClass(n)}">${n}</div>`
        ).join('');
      container.appendChild(game);
    }
  }

  generate();
</script>
</body>
</html>
